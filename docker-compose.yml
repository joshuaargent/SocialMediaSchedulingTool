version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: contenthub-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: contenthub_password
      POSTGRES_DB: contenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Adminer for database management
  adminer:
    image: adminer:latest
    container_name: contenthub-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

volumes:
  pgdata: